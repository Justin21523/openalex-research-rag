version: "3.9"

services:
  api:
    build: .
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.cache:/app/.cache
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - HF_HOME=/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    command: uv run streamlit run src/app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./.cache:/app/.cache
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - HF_HOME=/app/.cache/huggingface
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

