# nginx snippet for the dothost portfolio server.
# Serves the static frontend at /projects/openalex-research-rag/ and proxies its
# /api to the FastAPI backend running on the server (port 8020).
#
# Add inside the existing server { } block, then: nginx -t && systemctl reload nginx

location = /projects/openalex-research-rag {
    return 301 /projects/openalex-research-rag/;
}

# Static SPA
location ^~ /projects/openalex-research-rag/ {
    alias /home/neojustin/public_html/projects/openalex-research-rag/;
    try_files $uri $uri/ /projects/openalex-research-rag/index.html;
}

# API → FastAPI backend on the server (which talks to local llama.cpp via the reverse tunnel)
location ^~ /projects/openalex-research-rag/api/ {
    proxy_pass http://127.0.0.1:8020/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    # SSE streaming (RAG answers, pipeline trace)
    proxy_buffering off;
    proxy_cache off;
}
